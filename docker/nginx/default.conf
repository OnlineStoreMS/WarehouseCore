server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 512m;

    # Docker DNS: re-resolve when upstream containers get new IPs
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $api_upstream http://warehousecore-api:8095;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /iam/ {
        set $iam_upstream http://usercore-api:8091;
        rewrite ^/iam/(.*)$ /api/v1/$1 break;
        proxy_pass $iam_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
